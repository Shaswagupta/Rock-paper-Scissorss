<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🎮 Rock Paper Scissors</h1>

      <!-- Scoreboard -->
      <div class="scoreboard">
        <div class="score-item">
          <div class="score-label">Your Score</div>
          <div class="score-value" id="playerScore">0</div>
        </div>
        <div class="score-item">
          <div class="score-label">Computer Score</div>
          <div class="score-value" id="computerScore">0</div>
        </div>
      </div>

      <!-- Game Buttons -->
      <div class="buttons-container">
        <button class="choice-btn" onclick="playGame('rock')">🪨 Rock</button>
        <button class="choice-btn" onclick="playGame('paper')">📄 Paper</button>
        <button class="choice-btn" onclick="playGame('scissors')">
          ✂️ Scissors
        </button>
      </div>

      <!-- Result Section -->
      <div class="result-section">
        <div class="choices-display">
          <div class="choice-display">
            <div class="choice-label">You</div>
            <div class="choice-value" id="playerChoice">—</div>
            <div class="choice-name" id="playerChoiceName"></div>
          </div>
          <div class="vs-text">VS</div>
          <div class="choice-display">
            <div class="choice-label">Computer</div>
            <div class="choice-value" id="computerChoice">—</div>
            <div class="choice-name" id="computerChoiceName"></div>
          </div>
        </div>
        <div class="result-text" id="resultText">
          <span class="result-placeholder">Make your move!</span>
        </div>
      </div>

      <!-- Reset Button -->
      <button class="reset-btn" onclick="resetScore()">Reset Score</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
